<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="EnergyBridge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00C2FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded app-tile background -->
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>

  <!-- stylized bridge -->
  <g fill="none" stroke="url(#fg)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <path d="M64 156 C84 112, 108 92, 128 92 C148 92, 172 112, 192 156"/>
    <path d="M64 156 v22"/>
    <path d="M192 156 v22"/>
  </g>

  <!-- energy bolt -->
  <path d="M140 104 L112 156 H132 L120 196 L168 136 H148 L160 104 Z" fill="#FFFFFF" opacity="0.95" filter="url(#soft)"/>

  <!-- bridge end nodes -->
  <circle cx="64" cy="186" r="10" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="192" cy="186" r="10" fill="#FFFFFF" opacity="0.95"/>
</svg>
