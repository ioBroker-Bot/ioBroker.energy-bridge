name: Test and Release

# Run this workflow on all pushes and pull requests
# as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    # github.event.head_commit is not available for all event types
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          # Use the current recommended Node.js version for linting
          node-version: '22.x'
          # Workaround for sporadic "npm error Exit handler never called" with npm 11 on Node 24
          package-cache: 'false'
          install-command: |
            npm cache clean --force
            npm install --no-audit --no-fund
          lint: true

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false
    needs: [check-and-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          package-cache: 'false'
          install-command: |
            npm cache clean --force
            npm install --no-audit --no-fund

  # Deploys the final package to NPM
  # Requires npm "Trusted Publishing" to be configured for this repository
  # See https://docs.npmjs.com/trusted-publishers
  deploy:
    needs: [check-and-lint, adapter-tests]
    # Trigger this step only when a commit on any branch is tagged with a version number
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    # Write permissions are required to create GitHub releases
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '22.x'
          package-cache: 'false'
          install-command: |
            npm cache clean --force
            npm install --no-audit --no-fund
          github-token: ${{ secrets.GITHUB_TOKEN }}
