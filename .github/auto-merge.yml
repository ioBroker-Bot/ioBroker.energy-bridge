# Auto-merge rules for Dependabot PRs
# See: https://github.com/iobroker-bot-orga/action-automerge-dependabot

- match:
    # Merge patch updates for production dependencies
    dependency_type: production
    update_type: "semver:patch"

- match:
    # Merge patch + minor updates for development dependencies
    dependency_type: development
    update_type: "semver:minor"

- match:
    # Merge patch + minor updates for package-lock only changes
    dependency_type: package-lock
    update_type: "semver:minor"
